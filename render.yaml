services:
  - type: web
    name: aucelia-multimarcas-backend
    runtime: node
    rootDir: loja-backend
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: FRONTEND_PUBLIC_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: MP_WEBHOOK_URL
        sync: false
